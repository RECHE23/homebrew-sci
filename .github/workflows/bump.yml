name: Bump formulae
on:
  schedule:
    - cron: "0 6 * * *"        # daily ~06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write              # push the bump branch
  pull-requests: write         # open the PR

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Open a PR for any formula behind its upstream latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for f in Formula/*.rb; do
            name=$(basename "$f" .rb)
            cur_url=$(sed -nE 's/.*url "([^"]+)".*/\1/p' "$f" | head -1)
            repo=$(printf '%s' "$cur_url" | sed -E 's#https://github.com/([^/]+/[^/]+)/archive/.*#\1#')
            cur=$(printf '%s' "$cur_url" | sed -E 's#.*/v([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz#\1#')
            latest=$(gh api "repos/$repo/releases/latest" -q .tag_name | sed 's/^v//')
            [ "$latest" = "$cur" ] && { echo "$name up to date ($cur)"; continue; }
            # forward-only guard: only bump if latest sorts strictly above current
            [ "$(printf '%s\n%s\n' "$cur" "$latest" | sort -V | tail -1)" = "$latest" ] || { echo "$name: latest $latest <= cur $cur, skip"; continue; }
            branch="bump/$name-$latest"
            git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1 && { echo "$branch exists, skip"; continue; }
            new_url="https://github.com/$repo/archive/refs/tags/v$latest.tar.gz"
            new_sha=$(curl -fsSL "$new_url" | sha256sum | awk '{print $1}')
            echo "$name: $cur -> $latest ($new_sha)"
            git switch -c "$branch"
            sed -i -E "s#url \"[^\"]+\"#url \"$new_url\"#" "$f"
            sed -i -E "s#sha256 \"[0-9a-f]{64}\"#sha256 \"$new_sha\"#" "$f"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "$name $latest"
            git push -u origin "$branch"
            gh pr create --base main --head "$branch" \
              --title "$name $latest" \
              --body "Automated bump of \`$name\` to v$latest (sha256 from the tagged tarball). Review and merge to publish."
          done
